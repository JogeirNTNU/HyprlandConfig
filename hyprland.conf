# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua


$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show run

source = ~/.config/hypr/conf/screen.conf
source = ~/.config/hypr/conf/shortcuts.conf

# Define workspaces on monitors
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-2

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # usikker
exec-once = ~/.config/hypr/conf/blue_yeti_fix.sh
exec-once = waybar
exec-once = hyprpaper # remove if using moving desktop backgrounds
# exec-once = discord
exec-once = steam
exec-once = vesktop
exec-onceexec-once = ~/.config/hypr/scripts/fix-dp1.sh

# launch specific apps on specific workspaces
windowrule {
  name = windowrule-1
  workspace = 3
  match:class = ^(Vesktop)
}

windowrule {
  name = windowrule-2
  workspace = 1
  match:class = ^(steam)
}

# international keyboard layout 
input {
	kb_layout = us
	kb_variant = altgr-intl
}

# animation speeds
animations {
	enabled = true

	# bezier (start speed and end speed on animations)
	bezier = myBezier, 0.05, 0.9, 0.1, 1.05
	bezier = fastBezier, 0.1, 1, 0.1, 1

	# Animation speeds
	animation = windows, 1, 1, fastBezier
	animation = windowsOut, 1, 3, fastBezier
	animation = windowsMove, 1, 3, fastBezier
	animation = border, 1, 4, default
	animation = fade, 1, 4, default
	animation = workspaces, 1, 3, myBezier
}

cursor {
    # Disable hardware cursors to prevent mouse movement from triggering HDR brightness shifts
    no_hardware_cursors = true
}
