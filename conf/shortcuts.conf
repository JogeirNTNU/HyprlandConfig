# =======================================================================================
# SHORTCUTS AND MOUSE-BINDINGS (conf/shortcuts.conf)
# =======================================================================================

# Systemcontrol
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, B, exec, killall -SIGUSR1 waybar # Vis/gøym waybar
bind = , Print, exec, grimblast --freeze copy area # Skjermklipp-verktøy
bind = SUPER_SHIFT, B, exec, firefox

# Tiling-control
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Change focus between windows
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mouse control on windows
bindm = $mainMod, mouse:272, movewindow    # Super + Venstre museknapp for å flytte fritt
bindm = $mainMod, mouse:273, resizewindow  # Super + Høgre museknapp for å endre storleik

# Mouse buttons to switch songs via spotify
bind = , mouse:275, exec, playerctl previous # Bakover-knapp på tommelen
bind = , mouse:276, exec, playerctl next     # Framover-knapp på tommelen

# Music/Video managing (prev, next, start/stop)
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next

# Mouse buttons to scroll to the sides --- doesn't work
#bind = , mouse_left, mouse_left_scroll
#bind = , mouse_right, mouse_right_scroll

# Volume changer
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
